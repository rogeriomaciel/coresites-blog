<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a12" />
  
  <!-- Subtle gradient glow -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12" />
      <stop offset="100%" stop-color="#1e1e36" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Decorative Abstract Shapes -->
  <g opacity="0.4">
    <circle cx="1000" cy="150" r="120" fill="none" stroke="#06b6d4" stroke-width="2" />
    <circle cx="1000" cy="150" r="80" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="8 4" />
    <rect x="900" y="400" width="100" height="100" rx="20" fill="none" stroke="#0ea5e9" stroke-width="3" transform="rotate(45 950 450)" />
    <circle cx="850" cy="200" r="10" fill="#06b6d4" />
    <circle cx="1100" cy="350" r="6" fill="#0ea5e9" />
  </g>

  <!-- Title Text -->
  <text x="80" y="280" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
    Como usar IA na
  </text>
  <text x="80" y="380" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#0ea5e9">
    sua oficina mecânica
  </text>

  <!-- Tagline / Badge -->
  <rect x="80" y="160" width="260" height="40" rx="20" fill="#0ea5e9" fill-opacity="0.2" stroke="#0ea5e9" stroke-width="2" />
  <text x="210" y="186" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0ea5e9" text-anchor="middle" letter-spacing="2">
    GUIA DE AUTOMAÇÃO
  </text>
  
  <!-- Footer line -->
  <text x="80" y="540" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#888899">
    CoreSites Blog | Dicas para modernizar o seu negócio
  </text>
</svg>
